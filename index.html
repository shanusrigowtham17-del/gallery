<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKY PARK | The Pinnacle of Luxury</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400&family=Playfair+Display:ital,wght@1,400;1,700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>

    <style>
        :root {
            /* Metallic Champagne Gold */
            --gold: linear-gradient(180deg, #fdf5e6 0%, #d4af37 50%, #8e6d13 100%);
            --accent-gold: #d4af37;
            --deep-obsidian: #050505;
            --off-white: #fafafa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--deep-obsidian);
            color: var(--off-white);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        /* Sophisticated Navigation */
        .nav-bar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            letter-spacing: 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 200;
            color: var(--off-white);
        }

        /* Apple-Style CTA */
        .call-action {
            position: fixed;
            bottom: 50px;
            right: 50px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.4);
            padding: 20px 40px;
            color: #fff;
            text-decoration: none;
            font-size: 0.65rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            transition: 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .call-action:hover {
            background: var(--accent-gold);
            color: var(--deep-obsidian);
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* Hero / Scroll Sections */
        .scroll-section {
            height: 120vh; /* Extra height for smoother scroll transitions */
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .container {
            width: 85%;
            height: 80vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .image-wrapper {
            width: 100%;
            height: 100%;
            overflow: hidden;
            clip-path: inset(15% 15% 15% 15%);
            will-change: clip-path;
        }

        /* Updated to target both images and videos */
        .image-wrapper img,
        .image-wrapper video {
            width: 100%;
            height: 120%;
            object-fit: cover;
            filter: brightness(0.6) contrast(1.1);
            transform: scale(1.4);
        }

        /* Deep Golden Text */
        .overlay-text {
            position: absolute;
            z-index: 5;
            text-align: center;
            pointer-events: none;
        }

        .overlay-text h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 12vw, 10rem);
            font-weight: 400;
            font-style: italic;
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            padding: 0;
            line-height: 0.8;
            letter-spacing: -2px;
        }

        .sub-headline {
            font-size: 0.7rem;
            letter-spacing: 12px;
            text-transform: uppercase;
            color: var(--accent-gold);
            display: block;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        /* Section Numbers */
        .section-index {
            position: absolute;
            left: 0;
            top: 20%;
            font-size: 10rem;
            font-family: 'Playfair Display', serif;
            opacity: 0.05;
            color: var(--accent-gold);
            z-index: 1;
        }

        /* Scroll Hint */
        .scroll-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.6rem;
            letter-spacing: 4px;
            opacity: 0.4;
        }

        @media (max-width: 768px) {
            .image-wrapper { clip-path: inset(10% 5% 10% 5%); }
            .nav-bar { padding: 30px; }
            .logo { letter-spacing: 8px; }
            .call-action { bottom: 0; right: 0; width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <div class="logo">SKY PARK</div>
        <div style="font-size: 0.6rem; letter-spacing: 2px;">DELHI | DUBAI | LONDON</div>
    </nav>

    <a href="tel:+919654655999" class="call-action">Request Concierge</a>

    <main>
        <section class="scroll-section">
            <div class="container">
                <span class="section-index">01</span>
                <div class="image-wrapper">
                    <img src="park1.jpg" alt="Sky Park Pavilion">
                </div>
                <div class="overlay-text">
                    <span class="sub-headline">The Arrival</span>
                    <h2>Celestial Hall</h2>
                </div>
            </div>
            <div class="scroll-hint">SCROLL TO DISCOVER</div>
        </section>

        <section class="scroll-section">
            <div class="container">
                <span class="section-index">02</span>
                <div class="image-wrapper">
                    <img src="park2.jpg" alt="Sky Park Banquet">
                </div>
                <div class="overlay-text">
                    <span class="sub-headline">Exquisite Dining</span>
                    <h2>Golden Aura</h2>
                </div>
            </div>
        </section>

        <section class="scroll-section">
            <div class="container">
                <span class="section-index">03</span>
                <div class="image-wrapper">
                    <img src="park3.jpg" alt="Sky Park Suites">
                </div>
                <div class="overlay-text">
                    <span class="sub-headline">The Sanctuary</span>
                    <h2>Cloud Suites</h2>
                </div>
            </div>
        </section>

        <section class="scroll-section">
            <div class="container">
                <span class="section-index">04</span>
                <div class="image-wrapper">
                    <img src="park.jpg" alt="Sky Park Legacy">
                </div>
                <div class="overlay-text">
                    <span class="sub-headline">Eternal Beauty</span>
                    <h2>Infinite Sky</h2>
                </div>
            </div>
        </section>

        <!-- New Video Section Added Here -->
        <section class="scroll-section">
            <div class="container">
                <span class="section-index">05</span>
                <div class="image-wrapper">
                    <!-- Added autoplay, muted, loop, and playsinline for smooth background play -->
                    <video autoplay muted loop playsinline>
                        <source src="parks.mp4" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>
                <div class="overlay-text">
                    <span class="sub-headline">The Experience</span>
                    <h2>Living Cinematic</h2>
                </div>
            </div>
        </section>
    </main>

    <script>
        // 1. Smooth Scroll Engine
        const lenis = new Lenis({
            duration: 1.8,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            orientation: 'vertical',
            smoothWheel: true,
        });

        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        // 2. Animation Logic
        gsap.registerPlugin(ScrollTrigger);

        document.querySelectorAll('.scroll-section').forEach((section) => {
            const wrapper = section.querySelector('.image-wrapper');
            // UPDATED: Now queries for either an image or a video element
            const media = section.querySelector('img, video'); 
            const text = section.querySelector('.overlay-text');
            const index = section.querySelector('.section-index');

            const timeline = gsap.timeline({
                scrollTrigger: {
                    trigger: section,
                    start: "top bottom",
                    end: "bottom top",
                    scrub: 1
                }
            });

            timeline
                .to(wrapper, {
                    clipPath: "inset(0% 0% 0% 0%)",
                    ease: "power1.inOut"
                })
                .to(media, { // Uses the new 'media' variable
                    scale: 1,
                    y: -100, // Parallax depth
                    ease: "none"
                }, 0)
                .fromTo(text, 
                    { y: 150, opacity: 0 }, 
                    { y: -50, opacity: 1, ease: "power2.out" }, 
                    0.2
                )
                .to(index, {
                    y: -200,
                    ease: "none"
                }, 0);
        });
    </script>
</body>
</html>
