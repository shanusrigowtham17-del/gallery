<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Park Luxury Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400&family=Cormorant+Garamond:ital,wght@1,300&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        :root {
            /* Metallic Gold Gradient Definition */
            --gold-gradient: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --black: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--black);
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Fixed Navigation */
        .nav-bar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px;
            text-align: center;
            z-index: 100;
            letter-spacing: 6px;
            font-size: 0.7rem;
            text-transform: uppercase;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
        }

        /* Floating Gold Call Button */
        .call-action {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid #bf953f;
            padding: 15px 25px;
            border-radius: 100px;
            color: #fff;
            text-decoration: none;
            transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            font-size: 0.85rem;
        }

        .pulse {
            width: 8px; height: 8px;
            background: #fcf6ba;
            border-radius: 50%;
            margin-right: 12px;
            box-shadow: 0 0 10px #bf953f;
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }

        /* Full-Screen Scroll Sections */
        .scroll-section {
            height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .image-wrapper {
            width: 85%;
            height: 80%;
            overflow: hidden;
            position: relative;
            clip-path: inset(15% 15% 15% 15%);
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scale(1.4);
        }

        /* Metallic Gold Text Styling */
        .overlay-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2rem, 10vw, 6rem);
            font-style: italic;
            z-index: 2;
            text-align: center;
            width: 90%;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .image-wrapper {
                width: 95%;
                height: 70%;
                clip-path: inset(10% 5% 10% 5%); /* Less aggressive crop on mobile */
            }
            .call-action {
                left: 20px;
                right: 20px;
                bottom: 20px;
                justify-content: center;
                padding: 12px;
            }
            .nav-bar { letter-spacing: 3px; }
            .overlay-text { 
                font-size: 2.8rem; 
                line-height: 1.1;
            }
        }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #bf953f; }
    </style>
</head>
<body>

    <nav class="nav-bar">Park Premium Collection</nav>

    <a href="tel:+919654655999" class="call-action">
        <span class="pulse"></span>
        <span>CALL TO BOOK: 9654655999</span>
    </a>

    <main id="main-content">
        <section class="scroll-section">
            <div class="image-wrapper">
                <img src="park1.jpg" alt="Park 1">
                <div class="overlay-text">The Grand Pavilion</div>
            </div>
        </section>
        <section class="scroll-section">
            <div class="image-wrapper">
                <img src="park2.jpg" alt="Park 2">
                <div class="overlay-text">Elite Banquet</div>
            </div>
        </section>
        <section class="scroll-section">
            <div class="image-wrapper">
                <img src="park3.jpg" alt="Park 3">
                <div class="overlay-text">Golden Suites</div>
            </div>
        </section>
        <section class="scroll-section">
            <div class="image-wrapper">
                <img src="park.jpg" alt="Park 4">
                <div class="overlay-text">Timeless Luxury</div>
            </div>
        </section>
    </main>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        document.querySelectorAll('.scroll-section').forEach((section) => {
            const wrapper = section.querySelector('.image-wrapper');
            const image = section.querySelector('img');
            const text = section.querySelector('.overlay-text');

            const timeline = gsap.timeline({
                scrollTrigger: {
                    trigger: section,
                    start: "top bottom",
                    end: "bottom top",
                    scrub: 1.2
                }
            });

            timeline
                .to(wrapper, {
                    clipPath: "inset(0% 0% 0% 0%)",
                    ease: "power2.inOut"
                })
                .to(image, {
                    scale: 1,
                    ease: "none"
                }, 0)
                .fromTo(text, 
                    { opacity: 0, scale: 0.8, letterSpacing: "20px" },
                    { opacity: 1, scale: 1, letterSpacing: "2px", duration: 0.6 },
                    0.2
                );
        });
    </script>
</body>
</html>
